<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI定制规划师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Google Fonts 暂时禁用 (测试 Georgia/Cambria/Times) -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
</head>
<body>
    <!-- 噪点纹理层 -->
    <div class="noise-overlay"></div>

    <div class="app-container">
        <!-- 主体交互区 -->
        <main class="main-content">
            <!-- 头部标题 -->
            <header class="header">
                <h1 class="main-title">还没想好去哪浪？</h1>
                <p class="subtitle">别让工位困住你的灵魂</p>
            </header>

            <!-- 目的地选择 - 地点选择器 -->
            <section class="destination-section">
                <label class="section-label">
                    <span class="iconify" data-icon="lucide:map-pin"></span>
                    <span>目的地 (别说家门口)</span>
                </label>
                <div class="destination-grid" id="destinationGrid">
                    <div class="destination-card supported" data-destination="桂林">
                        <span class="destination-icon">🏔️</span>
                        <span class="destination-name">桂林</span>
                        <span class="destination-badge">支持定制</span>
                    </div>
                    <div class="destination-card unsupported" data-destination="南宁">
                        <span class="destination-icon">🌴</span>
                        <span class="destination-name">南宁</span>
                        <span class="destination-badge unavailable">暂未支持</span>
                    </div>
                    <div class="destination-card unsupported" data-destination="长沙">
                        <span class="destination-icon">🌶️</span>
                        <span class="destination-name">长沙</span>
                        <span class="destination-badge unavailable">暂未支持</span>
                    </div>
                    <div class="destination-card unsupported" data-destination="北海">
                        <span class="destination-icon">🏖️</span>
                        <span class="destination-name">北海</span>
                        <span class="destination-badge unavailable">暂未支持</span>
                    </div>
                    <div class="destination-card unsupported" data-destination="北京">
                        <span class="destination-icon">🏛️</span>
                        <span class="destination-name">北京</span>
                        <span class="destination-badge unavailable">暂未支持</span>
                    </div>
                </div>
                <input type="hidden" id="destination" value="">
            </section>

            <!-- 天数选择 - 巨大不对称 -->
            <section class="days-section">
                <label class="section-label">
                    <span class="iconify" data-icon="lucide:calendar"></span>
                    <span>给我几天，带你逃跑</span>
                </label>
                <div class="days-selector-raw">
                    <button class="day-btn-raw" data-days="2">
                        <span class="day-num">2</span>
                        <span class="day-label">天</span>
                    </button>
                    <button class="day-btn-raw active" data-days="3">
                        <span class="day-num">3</span>
                        <span class="day-label">天</span>
                    </button>
                    <button class="day-btn-raw" data-days="5">
                        <span class="day-num">5</span>
                        <span class="day-label">天</span>
                    </button>
                    <button class="day-btn-raw" data-days="7">
                        <span class="day-num">7</span>
                        <span class="day-label">天</span>
                    </button>
                </div>
            </section>

            <!-- 偏好标签 - 不规则云 -->
            <section class="preferences-section">
                <label class="section-label">
                    <span class="iconify" data-icon="lucide:heart"></span>
                    <span>有什么奇怪的癖好？</span>
                </label>
                <div class="tags-cloud">
                    <button class="tag-raw tag-large" data-tag="山水">
                        <span class="iconify" data-icon="ph:mountains-bold"></span>
                        <span>山水</span>
                    </button>
                    <button class="tag-raw tag-small" data-tag="文化">
                        <span class="iconify" data-icon="ph:museum"></span>
                        <span>文化</span>
                    </button>
                    <button class="tag-raw tag-medium" data-tag="美食">
                        <span class="iconify" data-icon="ph:chopsticks"></span>
                        <span>美食</span>
                    </button>
                    <button class="tag-raw tag-small" data-tag="海岛">
                        <span class="iconify" data-icon="ph:umbrella-simple"></span>
                        <span>海岛</span>
                    </button>
                    <button class="tag-raw tag-large" data-tag="古镇">
                        <span class="iconify" data-icon="ph:house-line"></span>
                        <span>古镇</span>
                    </button>
                    <button class="tag-raw tag-medium" data-tag="徒步">
                        <span class="iconify" data-icon="ph:hiking-boot"></span>
                        <span>徒步</span>
                    </button>
                    <button class="tag-raw tag-small" data-tag="摄影">
                        <span class="iconify" data-icon="ph:camera"></span>
                        <span>摄影</span>
                    </button>
                    <button class="tag-raw tag-medium" data-tag="休闲">
                        <span class="iconify" data-icon="ph:coffee"></span>
                        <span>摸鱼</span>
                    </button>
                </div>
            </section>

            <!-- 生成按钮 -->
            <section class="generate-section">
                <button class="generate-btn-raw" id="generateBtn">
                    <span class="iconify" data-icon="ph:lightning-bold"></span>
                    <span>生成逃离计划</span>
                    <div class="btn-glitch"></div>
                </button>
            </section>

            <!-- 路线结果 -->
            <section class="routes-section hidden" id="routesSection">
                <div class="section-header-raw">
                    <span class="iconify" data-icon="lucide:route"></span>
                    <span>逃跑路线已生成</span>
                </div>
                <div class="routes-container-raw" id="routesContainer"></div>
            </section>
        </main>
    </div>

    <!-- 底部导航 - 打破常规 -->
    <nav class="bottom-nav-raw">
        <a href="#" class="nav-item-raw active">
            <span class="iconify" data-icon="ph:compass"></span>
            <span>探索</span>
        </a>
        <a href="#" class="nav-item-raw">
            <span class="iconify" data-icon="ph:star"></span>
            <span>收藏</span>
        </a>
        <a href="#" class="nav-item-raw">
            <span class="iconify" data-icon="ph:user"></span>
            <span>我的</span>
        </a>
    </nav>

    <!-- 路线详情弹窗 -->
    <div class="modal-raw hidden" id="routeModal">
        <div class="modal-backdrop-raw"></div>
        <div class="modal-content-raw">
            <button class="modal-close-raw" id="modalClose">
                <span class="iconify" data-icon="ph:x-bold"></span>
            </button>
            <div class="modal-body-raw" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
